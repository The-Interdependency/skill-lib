name: bootstrap interdependent work graph indexes

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/bootstrap-interdependent-work-graph.yml"

permissions:
  contents: write

jobs:
  synchronize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out skill branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Synchronize skill entry points
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          index_path = Path("skills.json")
          index = json.loads(index_path.read_text(encoding="utf-8"))
          for skill in index["skills"]:
              if skill["name"] == "interdependent-work-graph":
                  skill.pop("depends_on", None)
                  break
          else:
              raise SystemExit("interdependent-work-graph is missing from skills.json")
          index_path.write_text(
              json.dumps(index, indent=2, ensure_ascii=False) + "\n",
              encoding="utf-8",
          )

          def replace_once(path_name: str, old: str, new: str) -> None:
              path = Path(path_name)
              text = path.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"expected text not found in {path_name}: {old[:80]!r}")
              path.write_text(text.replace(old, new, 1), encoding="utf-8")

          readme_row = "| [`the-interdependency/`](the-interdependency/SKILL.md) | Workflow and protocol for code building, researching, GitHub maintenance and updates, EDCMBONE transcript assembly for analysis, and anything that touches The Interdependency organization or The Interdependent Way projects. Enforces structure preservation (neurodivergence-compatible), mandatory usage guidance in all artifacts, framework-aligned EDCMBONE analysis, and org-standard GitHub hygiene. Independent of msdmd. |\n"
          replace_once(
              "README.md",
              readme_row,
              readme_row
              + "| [`interdependent-work-graph/`](interdependent-work-graph/SKILL.md) | Cross-repository coordination doctrine. Resolves exact participating commits, authority roles, work relations, non-transfer boundaries, shared stack manifests, and validation/materialization order before a stack-level task is reduced to one repository. Independent of msdmd. |\n",
          )
          replace_once(
              "README.md",
              "`meta`, `the-interdependency`, `loop-eng`, and `skill-build` are the existing examples).",
              "`meta`, `the-interdependency`, `interdependent-work-graph`, `loop-eng`, and `skill-build` are the existing examples).",
          )

          replace_once(
              "AGENTS.md",
              "`a0p-instancing`, `plain-lens`, `gonal-morphology`, `meta`, `the-interdependency`, `loop-eng`, and `skill-build`) are procedural and\n",
              "`a0p-instancing`, `plain-lens`, `gonal-morphology`, `meta`, `the-interdependency`, `interdependent-work-graph`, `loop-eng`, and `skill-build`) are procedural and\n",
          )
          org_bullet = "- If you are building code, researching, performing GitHub maintenance or updates, assembling EDCMBONE transcripts for analysis, or any work that touches The Interdependency organization, The Interdependent Way projects, or related assets (edcmbone, ucns, pcea, skill-lib, a0, aimmh, etc.), load `the-interdependency/SKILL.md` and follow its structure-preservation, EDCMBONE framework, mandatory usage-guidance, and org-workflow rules.\n"
          replace_once(
              "AGENTS.md",
              org_bullet,
              org_bullet
              + "- If the task spans, consumes, compares, publishes to, or changes the contract between multiple repositories, load `interdependent-work-graph/SKILL.md` before choosing an edit workspace. Resolve exact commits, authority roles, relations, non-transfer boundaries, and one shared graph record.\n",
          )

          replace_once(
              "ORG_DISTRIBUTION.md",
              "* `the-interdependency/` â€” org-wide workflow protocol and usage-guidance doctrine for The Interdependency projects\n",
              "* `the-interdependency/` â€” org-wide workflow protocol and usage-guidance doctrine for The Interdependency projects\n"
              "* `interdependent-work-graph/` â€” cross-repository identity, authority, coordination, and shared stack-manifest doctrine\n",
          )
          replace_once(
              "ORG_DISTRIBUTION.md",
              "Before creating a new module, route, service, adapter, schema, worker,\n",
              "Before assigning a stack-level task to one repository, agents should read:\n\n"
              "```text\n.agents/skills/interdependent-work-graph/SKILL.md\n```\n\n"
              "Resolve the exact participating repository and evidence-source identities first. Repository boundaries remain authority and provenance boundaries, not agent-attention boundaries.\n\n"
              "Before creating a new module, route, service, adapter, schema, worker,\n",
          )

          claude_row = "| `the-interdependency/` | procedural | â€” | Workflow protocol for The Interdependency org: code/research/GitHub maintenance, EDCMBONE transcript assembly and analysis, and mandatory usage-guidance + structure-preservation doctrine across artifacts. |\n"
          replace_once(
              "CLAUDE.md",
              claude_row,
              claude_row
              + "| `interdependent-work-graph/` | procedural | â€” | Cross-repository coordination. Resolves exact participant identities, authority roles, relations, non-transfer boundaries, shared graph manifests, and validation/materialization order before selecting edit locations. Related doctrine: `the-interdependency`, `canon`. |\n",
          )
          replace_once(
              "CLAUDE.md",
              "`gonal-morphology/`, `meta/`, `the-interdependency/`, `loop-eng/`, and `skill-build/` are the examples.",
              "`gonal-morphology/`, `meta/`, `the-interdependency/`, `interdependent-work-graph/`, `loop-eng/`, and `skill-build/` are the examples.",
          )
          PY

      - name: Run editorial and compliance checks
        run: |
          python -m unittest discover -s tests
          python tools/check_skill_lib_drift.py
          python tools/check_skill_compliance.py
          python -m llms.build --root . --out llms.txt --check

      - name: Commit synchronized indexes
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add skills.json README.md AGENTS.md ORG_DISTRIBUTION.md CLAUDE.md
          git diff --cached --stat
          git commit -m "docs(skill): synchronize work-graph doctrine"
          git pull --rebase origin "$BRANCH"
          git push origin "HEAD:${BRANCH}"
